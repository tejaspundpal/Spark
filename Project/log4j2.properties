# Databricks-optimized log4j Configuration
# Last Updated: August 6, 2025
status = info
name = DatabricksSparkConfig

# Properties
property.basePath = ${spark.log.dir:-/dbfs/logs/spark}
property.filePrefix = ${spark.app.name:-spark-application}
property.logLevel = ${spark.log.level:-info}

# Console Appender Configuration
appender.console.type = Console
appender.console.name = ConsoleAppender
appender.console.target = SYSTEM_ERR
appender.console.layout.type = PatternLayout
appender.console.layout.pattern = %d{yyyy-MM-dd HH:mm:ss.SSS} [%t] %-5level %logger{36} - %msg%n
appender.console.filter.threshold.type = ThresholdFilter
appender.console.filter.threshold.level = info

# DBFS File Appender Configuration
appender.file.type = RollingFile
appender.file.name = FileAppender
appender.file.fileName = ${basePath}/${filePrefix}.log
appender.file.filePattern = ${basePath}/${filePrefix}-%d{yyyy-MM-dd}-%i.log.gz
appender.file.layout.type = PatternLayout
appender.file.layout.pattern = %d{yyyy-MM-dd HH:mm:ss.SSS} %-5p %c{1}:%L [%X{userIdentifier}] [%X{jobId}] [%X{notebookId}] - %m%n
appender.file.policies.type = Policies
appender.file.policies.time.type = TimeBasedTriggeringPolicy
appender.file.policies.time.interval = 1
appender.file.policies.time.modulate = true
appender.file.policies.size.type = SizeBasedTriggeringPolicy
appender.file.policies.size.size = 100MB
appender.file.strategy.type = DefaultRolloverStrategy
appender.file.strategy.max = 30
appender.file.strategy.delete.type = Delete
appender.file.strategy.delete.basePath = ${basePath}
appender.file.strategy.delete.maxDepth = 1
appender.file.strategy.delete.ifLastModified.type = IfLastModified
appender.file.strategy.delete.ifLastModified.age = 30d

# Root Logger
rootLogger.level = ${logLevel}
rootLogger.appenderRefs = console, file
rootLogger.appenderRef.console.ref = ConsoleAppender
rootLogger.appenderRef.file.ref = FileAppender

# Spark Logger Configuration
logger.spark.name = org.apache.spark
logger.spark.level = info
logger.spark.additivity = false
logger.spark.appenderRefs = console, file
logger.spark.appenderRef.console.ref = ConsoleAppender
logger.spark.appenderRef.file.ref = FileAppender

# Spark Executor Logger
logger.sparkExecutor.name = org.apache.spark.executor
logger.sparkExecutor.level = info
logger.sparkExecutor.additivity = false
logger.sparkExecutor.appenderRefs = console, file
logger.sparkExecutor.appenderRef.console.ref = ConsoleAppender
logger.sparkExecutor.appenderRef.file.ref = FileAppender

# Spark SQL Logger
logger.sparkSQL.name = org.apache.spark.sql
logger.sparkSQL.level = info
logger.sparkSQL.additivity = false
logger.sparkSQL.appenderRefs = console, file
logger.sparkSQL.appenderRef.console.ref = ConsoleAppender
logger.sparkSQL.appenderRef.file.ref = FileAppender

# Databricks Logger
logger.databricks.name = com.databricks
logger.databricks.level = info
logger.databricks.additivity = false
logger.databricks.appenderRefs = console, file
logger.databricks.appenderRef.console.ref = ConsoleAppender
logger.databricks.appenderRef.file.ref = FileAppender

# Silence noisy loggers
logger.jetty.name = org.sparkproject.jetty
logger.jetty.level = warn
logger.jetty.additivity = false
logger.jetty.appenderRefs = file
logger.jetty.appenderRef.file.ref = FileAppender

logger.hadoop.name = org.apache.hadoop
logger.hadoop.level = warn
logger.hadoop.additivity = false
logger.hadoop.appenderRefs = file
logger.hadoop.appenderRef.file.ref = FileAppender